<!doctype html>
<html lang="mn">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WebAR Lab - Model Viewer</title>


<script type="module" src="js/model-viewer.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  transition: background 0.3s;
}

header {
  padding: 12px 16px;
}

model-viewer {
  width: 100vw;
  height: calc(100vh - 130px);
  background: #ffffff;
}

.controls {
  padding: 10px 16px;
}

button {
  padding: 8px 14px;
  margin-right: 10px;
  border: none;
  background: #333;
  color: white;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #555;
}

.hint {
  color: #444;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
<h2 style="margin:0;">☕ WebAR Coffee Cup</h2>
<div class="hint">
3D моделио эргүүлж, томруулж болно. AR товчийг дарж камер дээр
байрлуул.
</div>
</header>

<div class="controls">
<button onclick="toggleRotate()">Auto Rotate ON/OFF</button>
<button onclick="changeBg()">Background солих</button>
</div>
<model-viewer id="model" src="walk.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls auto-rotate shadow-intensity="0.8" alt="3D model in AR"> </model-viewer>

<script>
function toggleRotate() {
  const model = document.getElementById("model");

  if (model.hasAttribute("auto-rotate")) {
    model.removeAttribute("auto-rotate");
  } else {
    model.setAttribute("auto-rotate", "");
  }
}

function changeBg() {
  const viewer = document.getElementById("model");
  const colors = ["#f5f5f5", "#dfe6e9", "#ffeaa7", "#d0f0ff"];
  const randomColor = colors[Math.floor(Math.random() * colors.length)];

  viewer.style.background = randomColor;   // ← BODY биш, model-viewer өөрөө
}
</script>

</body>
</html>
